<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dolphin Jump — Moody Abyss</title>
<style>
  :root {
    --glow-cyan: #5ff0ff;
    --glow-soft: #9fe9ff;
    --gold: #ffd34d;
    --tile-face: #eaf7ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #333;
    font-family: "Trebuchet MS", "Segoe UI", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ===== PORTRAIT STAGE 400 x 760 ===== */
  .stage {
    position: relative;
    width: 400px;
    height: 760px;
    border-radius: 34px;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,0.65), 0 0 0 1px rgba(120,200,255,0.12) inset;
    /* darker toward the TOP (the deep), lighter & warmer near the bottom (the start) */
    background:
      radial-gradient(120% 80% at 50% 102%, rgba(40,90,120,0.55) 0%, rgba(40,90,120,0) 55%),
      linear-gradient(180deg,
        #050a1f 0%,
        #071233 16%,
        #0a1c47 34%,
        #0c264f 52%,
        #0f3358 70%,
        #134260 86%,
        #185170 100%);
    color: #eaf7ff;
    isolation: isolate;
  }

  /* faint light rays raking down from the surface above */
  .rays {
    position: absolute;
    inset: -10% -20% auto -20%;
    height: 70%;
    pointer-events: none;
    opacity: 0.5;
    background:
      linear-gradient(192deg, rgba(150,220,255,0.20) 0 4%, transparent 4% 13%),
      linear-gradient(176deg, rgba(150,220,255,0.16) 0 3%, transparent 3% 14%),
      linear-gradient(205deg, rgba(150,220,255,0.13) 0 5%, transparent 5% 18%);
    mix-blend-mode: screen;
    filter: blur(1px);
  }

  /* sparkling bioluminescent particles */
  .particles { position: absolute; inset: 0; pointer-events: none; }
  .particles i {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--glow-soft);
    box-shadow: 0 0 6px 2px rgba(120,230,255,0.8);
    opacity: 0.75;
    animation: twinkle 4.5s ease-in-out infinite;
  }
  .particles i:nth-child(odd) { background: #b6f3ff; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.18; transform: scale(0.7); }
    50%      { opacity: 0.95; transform: scale(1.15); }
  }

  /* ===== TITLE ===== */
  .title-wrap {
    position: absolute;
    top: 16px; left: 0; right: 0;
    text-align: center;
    z-index: 5;
  }
  .title {
    display: inline-block;
    font-weight: 900;
    font-size: 46px;
    line-height: 0.9;
    letter-spacing: 0.5px;
    color: #f4fcff;
    /* layered glow + crisp dark keyline so it pops on dark water without gradient-clip fragility */
    text-shadow:
      0 0 4px rgba(255,255,255,0.9),
      0 0 18px rgba(95,240,255,0.85),
      0 0 34px rgba(57,182,255,0.7),
      0 2px 0 #0a2c52,
      0 3px 0 #0a2c52,
      0 4px 6px rgba(0,0,0,0.55);
  }
  .title .l1 {
    display: block;
    transform: rotate(-3deg);
  }
  .title .l2 {
    display: block;
    transform: rotate(3deg) translateX(10px);
    margin-top: 2px;
    color: #fff3c4;
    text-shadow:
      0 0 4px rgba(255,255,255,0.9),
      0 0 18px rgba(255,211,77,0.9),
      0 0 34px rgba(255,160,40,0.7),
      0 2px 0 #5a3413,
      0 3px 0 #5a3413,
      0 4px 6px rgba(0,0,0,0.55);
  }
  .tagline {
    margin-top: 6px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #7fd6ff;
    opacity: 0.85;
  }

  /* ===== DOLPHIN LINEUP ===== */
  .lineup {
    position: absolute;
    top: 118px; left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 6px;
    z-index: 5;
  }
  .token { width: 90px; height: 86px; }
  .token svg { width: 100%; height: 100%; display: block; }
  .bob1 { animation: bob 3.2s ease-in-out infinite; }
  .bob2 { animation: bob 3.2s ease-in-out infinite 0.4s; }
  .bob3 { animation: bob 3.2s ease-in-out infinite 0.8s; }
  .bob4 { animation: bob 3.2s ease-in-out infinite 1.2s; }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-6px) rotate(1.5deg); }
  }

  /* ===== BOARD ===== */
  .board {
    position: absolute;
    top: 214px; left: 14px; right: 14px;
    bottom: 150px;
    z-index: 4;
  }
  .board-svg { width: 100%; height: 100%; display: block; overflow: visible; }

  /* ===== DIE + WIN BANNER ROW ===== */
  .bottom {
    position: absolute;
    left: 14px; right: 14px; bottom: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 6;
  }
  .die { width: 92px; height: 92px; }
  .win { width: 232px; height: 96px; }
  .die svg, .win svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .pulse { animation: pulse 2.6s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(255,211,77,0.5)); }
    50%      { filter: drop-shadow(0 0 16px rgba(255,211,77,0.95)); }
  }

  /* ===== CAPTION ===== */
  .caption {
    position: absolute;
    left: 0; right: 0; bottom: 12px;
    text-align: center;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #6fb8d8;
    z-index: 7;
  }
</style>
</head>
<body>
<div class="page">
  <div class="stage">

    <!-- atmosphere -->
    <div class="rays"></div>
    <div class="particles">
      <i style="top:6%;left:12%"></i><i style="top:10%;left:78%;animation-delay:1.1s"></i>
      <i style="top:16%;left:44%;animation-delay:.6s"></i><i style="top:23%;left:88%;animation-delay:2.2s"></i>
      <i style="top:30%;left:20%;animation-delay:1.7s"></i><i style="top:38%;left:64%;animation-delay:.3s"></i>
      <i style="top:46%;left:8%;animation-delay:2.6s"></i><i style="top:52%;left:90%;animation-delay:1.4s"></i>
      <i style="top:60%;left:34%;animation-delay:.9s"></i><i style="top:68%;left:72%;animation-delay:3.1s"></i>
      <i style="top:74%;left:16%;animation-delay:2.0s"></i><i style="top:82%;left:58%;animation-delay:1.2s"></i>
      <i style="top:88%;left:84%;animation-delay:.5s"></i><i style="top:90%;left:30%;animation-delay:2.8s"></i>
    </div>

    <!-- ===== TITLE ===== -->
    <div class="title-wrap">
      <div class="title"><span class="l1">Dolphin</span><span class="l2">Jump!</span></div>
      <div class="tagline">Deep Sea Race</div>
    </div>

    <!-- ===== DOLPHIN LINEUP (purple, pink, blue, green) ===== -->
    <div class="lineup">
      <div class="token bob1"><svg viewBox="0 0 100 96"><use href="#dolphin_purple_full" /></svg></div>
      <div class="token bob2"><svg viewBox="0 0 100 96"><use href="#dolphin_pink_full" /></svg></div>
      <div class="token bob3"><svg viewBox="0 0 100 96"><use href="#dolphin_blue_full" /></svg></div>
      <div class="token bob4"><svg viewBox="0 0 100 96"><use href="#dolphin_green_full" /></svg></div>
    </div>

    <!-- ===== BOARD SNIPPET ===== -->
    <!-- one clean snaking path, bottom (START) -> top (FINISH chest).
         Tile nodes, left->right snaking:
         START(56,372) 1(150,338) 2(250,300) +5(300,250) -3(220,212)
         SWAP(120,178) AGAIN(70,130) (stack on 1) FINISH(220,60)        -->
    <div class="board">
      <svg class="board-svg" viewBox="0 0 372 410" preserveAspectRatio="xMidYMid meet">

        <!-- glowing winding path under the tiles -->
        <path id="track" d="M 56 372
                 C 100 360, 120 348, 150 338
                 C 200 320, 220 312, 250 300
                 C 295 282, 312 270, 300 250
                 C 286 226, 250 224, 220 212
                 C 175 194, 150 196, 120 178
                 C 80 154, 58 158, 64 128
                 C 70 104, 110 110, 150 108
                 C 205 105, 230 88, 250 56"
              fill="none" stroke="rgba(95,240,255,0.16)" stroke-width="28" stroke-linecap="round" />
        <use href="#track" stroke="rgba(150,235,255,0.42)" stroke-width="3" stroke-dasharray="2 13" fill="none"/>

        <!-- START tile (bottom of the journey) -->
        <g transform="translate(56,372)"><use href="#tilebase"/>
          <text class="tnum" x="0" y="-6" text-anchor="middle" font-size="12" font-weight="900" fill="#0b2e4a">START</text>
          <path d="M -11 7 L 11 7 M 5 1 L 11 7 L 5 13" stroke="#1f8a5a" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <!-- plain numbered tiles 1,2,3 -->
        <g transform="translate(150,338)"><use href="#tilebase"/><text class="bignum" x="0" y="8">1</text></g>
        <g transform="translate(250,300)"><use href="#tilebase"/><text class="bignum" x="0" y="8">2</text></g>

        <!-- JUMP FORWARD (green current / water-jet whoosh) = good, +5 -->
        <g transform="translate(300,250)"><use href="#tile_green"/>
          <g stroke="#063b22" stroke-width="3.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
            <path d="M -15 -7 L -5 -7 M -8 -11 L -5 -7 L -8 -3"/>
            <path d="M -15 7 L -5 7 M -8 3 L -5 7 L -8 11"/>
          </g>
          <path d="M -3 0 L 13 0 M 6 -8 L 15 0 L 6 8" stroke="#063b22" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text class="special-num" x="0" y="40" fill="#7CFFB0">+5</text>
        </g>

        <!-- JUMP BACK (red grabby octopus) = setback, -3 -->
        <g transform="translate(220,212)"><use href="#tile_red"/>
          <use href="#octo"/>
          <text class="special-num" x="0" y="40" fill="#FF9AA0">-3</text>
        </g>

        <!-- plain numbered tile 3 -->
        <g transform="translate(120,178)"><use href="#tilebase"/><text class="bignum" x="0" y="8">3</text></g>

        <!-- SWITCH (blue whirlpool / swap arrows) -->
        <g transform="translate(64,128)"><use href="#tile_blue"/>
          <g stroke="#ffffff" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M -11 -5 A 11 11 0 0 1 11 -5"/>
            <path d="M 11 -5 l 1 -7 m -1 7 l -7 1"/>
            <path d="M 11 5 A 11 11 0 0 1 -11 5"/>
            <path d="M -11 5 l -1 7 m 1 -7 l 7 -1"/>
          </g>
          <text class="special-tag" x="0" y="40" fill="#9fe1ff">SWAP</text>
        </g>

        <!-- ROLL AGAIN (gold sparkly star/die) -->
        <g transform="translate(150,108)"><use href="#tile_gold"/>
          <path d="M0 -12 L3.4 -3.6 L12 -3.6 L5 1.8 L7.8 10 L0 5 L-7.8 10 L-5 1.8 L-12 -3.6 L-3.4 -3.6 Z"
                fill="#fff7da" stroke="#a06a00" stroke-width="1.4"/>
          <circle cx="0" cy="-1" r="2" fill="#a06a00"/>
          <text class="special-tag" x="0" y="40" fill="#ffe9a8">AGAIN</text>
        </g>

        <!-- TWO dolphins sharing tile 1 (proves tokens stay readable when stacked) -->
        <g transform="translate(150,338)">
          <g transform="translate(-15,-30) scale(0.40)"><use href="#dolphin_blue_full"/></g>
          <g transform="translate(8,-26) scale(0.40)"><use href="#dolphin_pink_full"/></g>
        </g>

        <!-- FINISH = glowing treasure chest (top of journey) -->
        <g transform="translate(250,56)" class="pulse">
          <use href="#chest"/>
          <text class="special-tag" x="0" y="40" fill="#ffe9a8" font-size="11">FINISH</text>
        </g>
      </svg>
    </div>

    <!-- ===== DIE + WIN BANNER ===== -->
    <div class="bottom">
      <div class="die"><svg viewBox="0 0 100 100"><use href="#die"/></svg></div>
      <div class="win"><svg viewBox="0 0 232 96"><use href="#winbanner"/></svg></div>
    </div>

    <div class="caption">Moody Abyss</div>

    <!-- =================================================================== -->
    <!-- ===== SVG DEFS: dolphins, tiles, octopus, chest, die, banner ===== -->
    <!-- =================================================================== -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <!-- gradients for each dolphin color (glossy) -->
        <linearGradient id="g_purple" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#c79bff"/><stop offset="0.5" stop-color="#9a5cf0"/><stop offset="1" stop-color="#6a2fc0"/>
        </linearGradient>
        <linearGradient id="g_pink" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffc3e3"/><stop offset="0.5" stop-color="#ff77b8"/><stop offset="1" stop-color="#e23f8f"/>
        </linearGradient>
        <linearGradient id="g_blue" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#9fe7ff"/><stop offset="0.5" stop-color="#39b6ff"/><stop offset="1" stop-color="#1577e0"/>
        </linearGradient>
        <linearGradient id="g_green" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#b6ffcf"/><stop offset="0.5" stop-color="#39e08a"/><stop offset="1" stop-color="#11a85c"/>
        </linearGradient>
        <radialGradient id="belly" cx="0.5" cy="0.65" r="0.6">
          <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>

        <!-- soft outer glow used by dolphins -->
        <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="3.2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="tileglow" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- ============ DOLPHIN BODY GEOMETRY ============ -->
        <!-- a leaping dolphin silhouette: rostrum + body arc, dorsal fin, tail fluke -->
        <path id="dpath" d="M20 62
          C 11 49, 17 31, 35 24
          C 50 18, 63 20, 72 28
          C 76 23, 84 20, 90 20
          C 88 27, 85 31, 83 34
          C 88 44, 86 57, 77 64
          C 84 68, 88 76, 88 80
          C 81 80, 74 76, 70 72
          C 56 78, 37 78, 25 70 Z"/>
      </defs>
    </svg>

    <!-- Master colored dolphins (each drawn explicitly for crisp control) -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <!-- PURPLE -->
        <g id="dolphin_purple_full">
          <g filter="url(#glow)">
            <use href="#dpath" stroke="#e3c8ff" stroke-width="5" fill="none" opacity="0.9"/>
            <use href="#dpath" fill="url(#g_purple)"/>
          </g>
          <path d="M28 64 C 36 74, 60 74, 70 66 C 60 70, 40 70, 28 64 Z" fill="url(#belly)"/>
          <path d="M40 58 C 34 70, 40 78, 50 78 C 48 70, 48 62, 46 58 Z" fill="#5a23ad"/>
          <path d="M34 30 C 48 24, 62 27, 70 33 C 58 30, 46 31, 38 37 Z" fill="#fff" opacity="0.45"/>
          <circle cx="42" cy="40" r="6.2" fill="#fff"/>
          <circle cx="43.2" cy="41" r="3.4" fill="#241033"/>
          <circle cx="41.6" cy="39.2" r="1.5" fill="#fff"/>
          <path d="M30 47 C 36 53, 46 53, 52 49" fill="none" stroke="#3d1a66" stroke-width="2.6" stroke-linecap="round"/>
        </g>
        <!-- PINK -->
        <g id="dolphin_pink_full">
          <g filter="url(#glow)">
            <use href="#dpath" stroke="#ffd6ec" stroke-width="5" fill="none" opacity="0.9"/>
            <use href="#dpath" fill="url(#g_pink)"/>
          </g>
          <path d="M28 64 C 36 74, 60 74, 70 66 C 60 70, 40 70, 28 64 Z" fill="url(#belly)"/>
          <path d="M40 58 C 34 70, 40 78, 50 78 C 48 70, 48 62, 46 58 Z" fill="#c22f73"/>
          <path d="M34 30 C 48 24, 62 27, 70 33 C 58 30, 46 31, 38 37 Z" fill="#fff" opacity="0.5"/>
          <circle cx="42" cy="40" r="6.2" fill="#fff"/>
          <circle cx="43.2" cy="41" r="3.4" fill="#4a1230"/>
          <circle cx="41.6" cy="39.2" r="1.5" fill="#fff"/>
          <path d="M30 47 C 36 53, 46 53, 52 49" fill="none" stroke="#7a1e49" stroke-width="2.6" stroke-linecap="round"/>
        </g>
        <!-- BLUE -->
        <g id="dolphin_blue_full">
          <g filter="url(#glow)">
            <use href="#dpath" stroke="#d6f6ff" stroke-width="5.4" fill="none" opacity="1"/>
            <use href="#dpath" fill="url(#g_blue)"/>
          </g>
          <path d="M28 64 C 36 74, 60 74, 70 66 C 60 70, 40 70, 28 64 Z" fill="url(#belly)"/>
          <path d="M40 58 C 34 70, 40 78, 50 78 C 48 70, 48 62, 46 58 Z" fill="#0c5fb8"/>
          <path d="M34 30 C 48 24, 62 27, 70 33 C 58 30, 46 31, 38 37 Z" fill="#fff" opacity="0.55"/>
          <circle cx="42" cy="40" r="6.2" fill="#fff"/>
          <circle cx="43.2" cy="41" r="3.4" fill="#0a2c52"/>
          <circle cx="41.6" cy="39.2" r="1.5" fill="#fff"/>
          <path d="M30 47 C 36 53, 46 53, 52 49" fill="none" stroke="#0a3d72" stroke-width="2.6" stroke-linecap="round"/>
        </g>
        <!-- GREEN -->
        <g id="dolphin_green_full">
          <g filter="url(#glow)">
            <use href="#dpath" stroke="#d2ffe2" stroke-width="5" fill="none" opacity="0.95"/>
            <use href="#dpath" fill="url(#g_green)"/>
          </g>
          <path d="M28 64 C 36 74, 60 74, 70 66 C 60 70, 40 70, 28 64 Z" fill="url(#belly)"/>
          <path d="M40 58 C 34 70, 40 78, 50 78 C 48 70, 48 62, 46 58 Z" fill="#0b8a4c"/>
          <path d="M34 30 C 48 24, 62 27, 70 33 C 58 30, 46 31, 38 37 Z" fill="#fff" opacity="0.5"/>
          <circle cx="42" cy="40" r="6.2" fill="#fff"/>
          <circle cx="43.2" cy="41" r="3.4" fill="#0c3d23"/>
          <circle cx="41.6" cy="39.2" r="1.5" fill="#fff"/>
          <path d="M30 47 C 36 53, 46 53, 52 49" fill="none" stroke="#0c5e35" stroke-width="2.6" stroke-linecap="round"/>
        </g>

        <!-- ============ TILE BASES ============ -->
        <!-- glowing light tile face so numbers stay legible on dark water -->
        <g id="tilebase">
          <g filter="url(#tileglow)">
            <circle r="26" fill="rgba(120,220,255,0.18)"/>
          </g>
          <circle r="23" fill="var(--tile-face)"/>
          <circle r="23" fill="none" stroke="#bfe6ff" stroke-width="2"/>
          <circle r="20" fill="none" stroke="rgba(95,240,255,0.5)" stroke-width="1.2"/>
        </g>
        <g id="tile_green">
          <g filter="url(#tileglow)"><circle r="27" fill="rgba(57,224,138,0.45)"/></g>
          <circle r="23" fill="#dfffe9"/>
          <circle r="23" fill="none" stroke="#39e08a" stroke-width="3"/>
        </g>
        <g id="tile_red">
          <g filter="url(#tileglow)"><circle r="27" fill="rgba(255,90,100,0.45)"/></g>
          <circle r="23" fill="#ffe4e6"/>
          <circle r="23" fill="none" stroke="#ff5a64" stroke-width="3"/>
        </g>
        <g id="tile_blue">
          <g filter="url(#tileglow)"><circle r="27" fill="rgba(57,182,255,0.5)"/></g>
          <circle r="23" fill="#1f78c8"/>
          <circle r="23" fill="none" stroke="#9fe7ff" stroke-width="3"/>
        </g>
        <g id="tile_gold">
          <g filter="url(#tileglow)"><circle r="27" fill="rgba(255,211,77,0.55)"/></g>
          <circle r="23" fill="#5a4a12"/>
          <circle r="23" fill="none" stroke="#ffd34d" stroke-width="3"/>
        </g>

        <!-- ============ OCTOPUS (jump back) ============ -->
        <g id="octo">
          <!-- head -->
          <ellipse cx="0" cy="-3" rx="11" ry="10" fill="#c2143d"/>
          <ellipse cx="0" cy="-5" rx="7" ry="5" fill="#ff5a72" opacity="0.7"/>
          <!-- grabby tentacles -->
          <g fill="none" stroke="#c2143d" stroke-width="3.6" stroke-linecap="round">
            <path d="M -8 4 C -14 10, -16 4, -14 0"/>
            <path d="M -3 7 C -5 16, -10 16, -10 11"/>
            <path d="M 3 7 C 5 16, 10 16, 10 11"/>
            <path d="M 8 4 C 14 10, 16 4, 14 0"/>
          </g>
          <!-- eyes -->
          <circle cx="-4" cy="-4" r="2.6" fill="#fff"/><circle cx="-3.2" cy="-3.4" r="1.3" fill="#3a0010"/>
          <circle cx="4" cy="-4" r="2.6" fill="#fff"/><circle cx="4.8" cy="-3.4" r="1.3" fill="#3a0010"/>
        </g>

        <!-- ============ TREASURE CHEST (finish, glowing) ============ -->
        <g id="chest">
          <!-- glow halo -->
          <g filter="url(#tileglow)"><ellipse cx="0" cy="2" rx="30" ry="24" fill="rgba(255,211,77,0.45)"/></g>
          <!-- chest body -->
          <rect x="-24" y="-2" width="48" height="22" rx="4" fill="#7a4a1c"/>
          <rect x="-24" y="-2" width="48" height="22" rx="4" fill="none" stroke="#5a3413" stroke-width="2"/>
          <!-- lid -->
          <path d="M -24 -2 A 24 16 0 0 1 24 -2 Z" fill="#8c5722"/>
          <path d="M -24 -2 A 24 16 0 0 1 24 -2 Z" fill="none" stroke="#5a3413" stroke-width="2"/>
          <!-- metal bands -->
          <rect x="-26" y="-3" width="6" height="24" rx="2" fill="#ffd34d"/>
          <rect x="20" y="-3" width="6" height="24" rx="2" fill="#ffd34d"/>
          <!-- lock -->
          <rect x="-5" y="4" width="10" height="9" rx="2" fill="#ffd34d" stroke="#a06a00" stroke-width="1"/>
          <circle cx="0" cy="8" r="1.8" fill="#a06a00"/>
          <!-- spilling glowing gold/gems -->
          <g>
            <circle cx="-10" cy="-6" r="3" fill="#ffe27a"/>
            <circle cx="0" cy="-9" r="3.4" fill="#fff2b0"/>
            <circle cx="9" cy="-6" r="3" fill="#ffe27a"/>
            <circle cx="-4" cy="-11" r="2.2" fill="#aef0ff"/>
            <circle cx="6" cy="-11" r="2.2" fill="#ffb0e0"/>
          </g>
          <!-- sparkles -->
          <path d="M0 -22 l1.6 4 l4 1.6 l-4 1.6 l-1.6 4 l-1.6 -4 l-4 -1.6 l4 -1.6 Z" fill="#fff7da"/>
          <path d="M16 -16 l1 2.4 l2.4 1 l-2.4 1 l-1 2.4 l-1 -2.4 l-2.4 -1 l2.4 -1 Z" fill="#fff"/>
        </g>

        <!-- ============ DIE ============ -->
        <g id="die">
          <g filter="url(#tileglow)"><rect x="14" y="14" width="72" height="72" rx="16" fill="rgba(120,220,255,0.3)"/></g>
          <rect x="14" y="14" width="72" height="72" rx="16" fill="#f4fbff"/>
          <rect x="14" y="14" width="72" height="72" rx="16" fill="none" stroke="#bfe6ff" stroke-width="3"/>
          <!-- subtle inner gradient sheen -->
          <rect x="18" y="18" width="64" height="30" rx="12" fill="#ffffff" opacity="0.6"/>
          <!-- 5 pips -->
          <circle cx="34" cy="34" r="6" fill="#0c264f"/>
          <circle cx="66" cy="34" r="6" fill="#0c264f"/>
          <circle cx="50" cy="50" r="6" fill="#0c264f"/>
          <circle cx="34" cy="66" r="6" fill="#0c264f"/>
          <circle cx="66" cy="66" r="6" fill="#0c264f"/>
        </g>

        <!-- ============ WIN BANNER ============ -->
        <g id="winbanner">
          <!-- glow -->
          <g filter="url(#tileglow)">
            <rect x="6" y="20" width="220" height="52" rx="26" fill="rgba(255,211,77,0.35)"/>
          </g>
          <!-- ribbon -->
          <rect x="10" y="22" width="212" height="48" rx="24" fill="#15365c"/>
          <rect x="10" y="22" width="212" height="48" rx="24" fill="none" stroke="#ffd34d" stroke-width="3"/>
          <!-- fireworks / stars -->
          <g>
            <path d="M30 16 l2.4 6 l6 2.4 l-6 2.4 l-2.4 6 l-2.4 -6 l-6 -2.4 l6 -2.4 Z" fill="#ffd34d"/>
            <path d="M205 14 l2 5 l5 2 l-5 2 l-2 5 l-2 -5 l-5 -2 l5 -2 Z" fill="#9fe7ff"/>
            <path d="M196 78 l1.6 4 l4 1.6 l-4 1.6 l-1.6 4 l-1.6 -4 l-4 -1.6 l4 -1.6 Z" fill="#ff9ad1"/>
          </g>
          <!-- text -->
          <text x="150" y="54" text-anchor="middle" font-size="26" font-weight="900"
                fill="#fff" style="paint-order:stroke" stroke="#0a223e" stroke-width="1">YOU WIN!</text>
          <!-- happy dolphin on the left -->
          <g transform="translate(58,46) scale(0.62) translate(-50,-48)">
            <use href="#dolphin_green_full"/>
          </g>
        </g>
      </defs>
    </svg>

  </div>
</div>
